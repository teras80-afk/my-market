<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Market</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface-2: #1c1c1c;
    --border: #262626;
    --text: #f5f5f0;
    --text-dim: #888;
    --text-faint: #555;
    --up: #ff5a3c;
    --down: #4a9eff;
    --accent: #d4b896;
    --night: #9d7fd4;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  body {
    background-image:
      radial-gradient(circle at 20% 0%, rgba(212,184,150,0.06) 0%, transparent 50%),
      radial-gradient(circle at 80% 100%, rgba(74,158,255,0.04) 0%, transparent 50%);
    background-attachment: fixed;
  }

  header {
    padding: 28px 20px 20px;
    border-bottom: 1px solid var(--border);
  }
  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 16px;
    flex-wrap: wrap;
  }
  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 800;
    font-size: clamp(26px, 5vw, 38px);
    letter-spacing: -0.02em;
    line-height: 1;
  }
  h1 .accent {
    color: var(--accent);
    font-style: italic;
    font-weight: 400;
  }
  .meta {
    font-size: 10px;
    color: var(--text-dim);
    text-align: right;
    line-height: 1.6;
    letter-spacing: 0.05em;
  }
  .meta .live {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--accent);
  }
  .live-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 24px 20px 80px;
  }

  .section {
    margin-bottom: 32px;
  }
  .section-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }
  .section-flag {
    font-family: 'Fraunces', serif;
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -0.02em;
  }
  .section-flag.kr { color: var(--up); }
  .section-flag.us { color: var(--down); }
  .section-flag.fx { color: var(--accent); }
  .section-flag.nt { color: var(--night); }
  .section-title {
    font-size: 10px;
    letter-spacing: 0.25em;
    color: var(--text-dim);
    text-transform: uppercase;
  }
  .section-note {
    font-size: 9px;
    color: var(--text-faint);
    font-style: italic;
    margin-left: 6px;
  }
  .section-count {
    margin-left: auto;
    font-size: 10px;
    color: var(--text-faint);
    letter-spacing: 0.1em;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 8px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 12px 14px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s, transform 0.2s;
    display: flex;
    flex-direction: column;
    gap: 6px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .card:hover {
    border-color: var(--accent);
    transform: translateY(-1px);
  }
  .card:active {
    transform: scale(0.98);
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 2px;
    height: 100%;
    background: var(--text-faint);
    transition: background 0.3s;
  }
  .card.up::before { background: var(--up); }
  .card.down::before { background: var(--down); }

  .card-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 6px;
  }
  .symbol {
    font-family: 'Fraunces', serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: -0.01em;
    line-height: 1.2;
  }
  .ticker {
    font-size: 9px;
    color: var(--text-faint);
    letter-spacing: 0.1em;
    white-space: nowrap;
  }

  .price-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 8px;
  }
  .price {
    font-family: 'Fraunces', serif;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.02em;
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }
  .price.up { color: var(--up); }
  .price.down { color: var(--down); }

  .pct {
    font-size: 11px;
    font-variant-numeric: tabular-nums;
    color: var(--text-dim);
    white-space: nowrap;
  }
  .pct.up { color: var(--up); }
  .pct.down { color: var(--down); }

  .chart {
    height: 32px;
    width: 100%;
    margin-top: 2px;
  }
  .chart svg {
    width: 100%;
    height: 100%;
    overflow: visible;
  }
  .chart .line {
    fill: none;
    stroke-width: 1.25;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .chart .area {
    opacity: 0.12;
  }
  .card.up .chart .line { stroke: var(--up); }
  .card.up .chart .area { fill: var(--up); }
  .card.down .chart .line { stroke: var(--down); }
  .card.down .chart .area { fill: var(--down); }

  .card-foot {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 9px;
    color: var(--text-faint);
    letter-spacing: 0.05em;
  }
  .delta {
    font-variant-numeric: tabular-nums;
  }
  .delta.up { color: var(--up); opacity: 0.7; }
  .delta.down { color: var(--down); opacity: 0.7; }

  .card.loading .price,
  .card.loading .pct,
  .card.loading .chart { opacity: 0.25; }
  .card.error .price {
    color: var(--text-faint);
    font-size: 12px;
  }
  .card.error .pct,
  .card.error .chart,
  .card.error .delta { display: none; }

  footer {
    text-align: center;
    padding: 24px;
    color: var(--text-faint);
    font-size: 10px;
    letter-spacing: 0.15em;
    border-top: 1px solid var(--border);
  }
  footer .refresh-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 10px 24px;
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 0.15em;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 16px;
  }
  footer .refresh-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  footer .refresh-btn:active { transform: scale(0.98); }
  footer .refresh-btn.refreshing {
    opacity: 0.5;
    pointer-events: none;
  }

  /* ============== 모달 (확대 캔들차트) ============== */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.85);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 1000;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .modal-backdrop.open {
    display: flex;
    opacity: 1;
  }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    width: 100%;
    max-width: 900px;
    max-height: 90vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transform: scale(0.96);
    transition: transform 0.2s;
  }
  .modal-backdrop.open .modal {
    transform: scale(1);
  }
  .modal-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    gap: 16px;
  }
  .modal-title {
    flex: 1;
    min-width: 0;
  }
  .modal-name {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.02em;
    margin-bottom: 4px;
  }
  .modal-ticker {
    font-size: 10px;
    color: var(--text-faint);
    letter-spacing: 0.15em;
  }
  .modal-price {
    text-align: right;
  }
  .modal-price-main {
    font-family: 'Fraunces', serif;
    font-size: 26px;
    font-weight: 600;
    letter-spacing: -0.02em;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    margin-bottom: 4px;
  }
  .modal-price-main.up { color: var(--up); }
  .modal-price-main.down { color: var(--down); }
  .modal-price-pct {
    font-size: 12px;
    font-variant-numeric: tabular-nums;
  }
  .modal-price-pct.up { color: var(--up); }
  .modal-price-pct.down { color: var(--down); }
  .modal-close {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    width: 32px;
    height: 32px;
    font-family: inherit;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.2s;
    flex-shrink: 0;
    line-height: 1;
  }
  .modal-close:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .modal-controls {
    display: flex;
    gap: 6px;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
  }
  .range-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 6px 14px;
    font-family: inherit;
    font-size: 10px;
    letter-spacing: 0.15em;
    cursor: pointer;
    transition: all 0.15s;
  }
  .range-btn:hover {
    border-color: var(--text-dim);
    color: var(--text);
  }
  .range-btn.active {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
  }

  .modal-chart-wrap {
    padding: 20px 24px;
    flex: 1;
    min-height: 360px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .modal-chart {
    flex: 1;
    width: 100%;
    min-height: 300px;
    position: relative;
  }
  .modal-chart svg {
    width: 100%;
    height: 100%;
    display: block;
  }
  .modal-chart .axis-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    fill: var(--text-faint);
    letter-spacing: 0.05em;
  }
  .modal-chart .grid-line {
    stroke: var(--border);
    stroke-width: 1;
    stroke-dasharray: 2 4;
  }
  .modal-chart .candle-up { fill: var(--up); stroke: var(--up); }
  .modal-chart .candle-down { fill: var(--down); stroke: var(--down); }
  .modal-chart .wick { stroke-width: 1; }
  .modal-loading {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-faint);
    font-size: 11px;
    letter-spacing: 0.15em;
  }
  .modal-empty {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-faint);
    font-size: 11px;
    text-align: center;
    padding: 20px;
  }

  .modal-stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    padding: 14px 24px 20px;
    border-top: 1px solid var(--border);
    font-size: 10px;
  }
  .stat-label {
    color: var(--text-faint);
    letter-spacing: 0.1em;
    margin-bottom: 3px;
  }
  .stat-value {
    font-variant-numeric: tabular-nums;
    color: var(--text);
  }

  @media (max-width: 600px) {
    header { padding: 20px 14px 14px; }
    main { padding: 18px 14px 60px; }
    .section { margin-bottom: 24px; }
    .grid { grid-template-columns: 1fr 1fr; gap: 6px; }
    .card { padding: 10px 11px; gap: 4px; }
    .symbol { font-size: 12px; }
    .price { font-size: 17px; }
    .pct { font-size: 10px; }
    .ticker { font-size: 8px; }
    .chart { height: 26px; }
    .section-flag { font-size: 17px; }
    .section-title { font-size: 9px; letter-spacing: 0.2em; }
    .section-note { display: none; }

    .modal-backdrop { padding: 8px; }
    .modal-head { padding: 14px 16px 12px; }
    .modal-name { font-size: 17px; }
    .modal-price-main { font-size: 20px; }
    .modal-controls { padding: 10px 16px; gap: 4px; }
    .range-btn { padding: 5px 10px; font-size: 9px; }
    .modal-chart-wrap { padding: 14px 12px; min-height: 280px; }
    .modal-chart { min-height: 240px; }
    .modal-stats { padding: 12px 16px 16px; gap: 8px; font-size: 9px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <h1>My <span class="accent">Market</span></h1>
    <div class="meta">
      <div class="live"><span class="live-dot"></span>LIVE</div>
      <div id="last-updated">—</div>
    </div>
  </div>
</header>

<main>
  <div class="section">
    <div class="section-header">
      <span class="section-flag kr">KR</span>
      <span class="section-title">국내 지표</span>
      <span class="section-count" id="count-kr"></span>
    </div>
    <div class="grid" id="grid-kr"></div>
  </div>

  <div class="section">
    <div class="section-header">
      <span class="section-flag us">US</span>
      <span class="section-title">해외 지표</span>
      <span class="section-count" id="count-us"></span>
    </div>
    <div class="grid" id="grid-us"></div>
  </div>

  <div class="section">
    <div class="section-header">
      <span class="section-flag nt">NT</span>
      <span class="section-title">야간 프록시</span>
      <span class="section-note">한국 야간 시장 흐름 가늠용</span>
      <span class="section-count" id="count-night"></span>
    </div>
    <div class="grid" id="grid-night"></div>
  </div>

  <div class="section">
    <div class="section-header">
      <span class="section-flag fx">FX</span>
      <span class="section-title">환율 · 금리</span>
      <span class="section-count" id="count-misc"></span>
    </div>
    <div class="grid" id="grid-misc"></div>
  </div>
</main>

<footer>
  <button class="refresh-btn" id="refresh-btn">REFRESH</button>
  <div>Data: Stooq via proxy · Delayed · Not for trading</div>
</footer>

<!-- 모달 -->
<div class="modal-backdrop" id="modal" role="dialog" aria-modal="true">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-head">
      <div class="modal-title">
        <div class="modal-name" id="modal-name">—</div>
        <div class="modal-ticker" id="modal-ticker">—</div>
      </div>
      <div class="modal-price">
        <div class="modal-price-main" id="modal-price">—</div>
        <div class="modal-price-pct" id="modal-pct">—</div>
      </div>
      <button class="modal-close" id="modal-close" aria-label="Close">✕</button>
    </div>
    <div class="modal-controls">
      <button class="range-btn" data-range="1M">1M</button>
      <button class="range-btn active" data-range="3M">3M</button>
      <button class="range-btn" data-range="1Y">1Y</button>
    </div>
    <div class="modal-chart-wrap">
      <div class="modal-chart" id="modal-chart">
        <div class="modal-loading">LOADING...</div>
      </div>
    </div>
    <div class="modal-stats">
      <div><div class="stat-label">OPEN</div><div class="stat-value" id="stat-open">—</div></div>
      <div><div class="stat-label">HIGH</div><div class="stat-value" id="stat-high">—</div></div>
      <div><div class="stat-label">LOW</div><div class="stat-value" id="stat-low">—</div></div>
      <div><div class="stat-label">CLOSE</div><div class="stat-value" id="stat-close">—</div></div>
    </div>
  </div>
</div>

<script>
  // ============================================================
  // 지표 설정
  // ============================================================
  const INDICATORS = {
    kr: [
      { name: 'KOSPI',     ticker: '코스피',   symbol: '^kospi' },
      { name: 'KOSDAQ',    ticker: '코스닥',   symbol: '^kosdaq' },
    ],
    us: [
      { name: 'S&P 500',   ticker: 'SPX',     symbol: '^spx' },
      { name: 'NASDAQ',    ticker: 'IXIC',    symbol: '^ndq' },
      { name: 'Dow Jones', ticker: 'DJI',     symbol: '^dji' },
      { name: 'NQ100 Fut', ticker: 'NQ=F',    symbol: 'nq.f' },
      { name: 'PHLX Semi', ticker: 'SOX',     symbol: '^sox' },
    ],
    night: [
      { name: 'MSCI Korea ETF', ticker: 'EWY',   symbol: 'ewy.us' },
      { name: 'S&P 500 Fut',    ticker: 'ES=F',  symbol: 'es.f' },
    ],
    misc: [
      { name: 'USD/KRW',   ticker: '원/달러',    symbol: 'usdkrw' },
      { name: 'US 10Y',    ticker: '미국채 10년', symbol: '10usy.b', isYield: true },
    ],
  };

  // 전체 indicator 평탄화 + symbol 기준 lookup
  const ALL = [...INDICATORS.kr, ...INDICATORS.us, ...INDICATORS.night, ...INDICATORS.misc];
  const BY_SYMBOL = Object.fromEntries(ALL.map(i => [i.symbol, i]));

  // ============================================================
  // CORS 프록시 폴백
  // ============================================================
  const PROXIES = [
    (u) => `https://corsproxy.io/?url=${encodeURIComponent(u)}`,
    (u) => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
    (u) => `https://api.codetabs.com/v1/proxy/?quest=${encodeURIComponent(u)}`,
  ];

  async function fetchWithProxy(targetUrl) {
    let lastErr;
    for (const wrap of PROXIES) {
      try {
        const res = await fetch(wrap(targetUrl));
        if (!res.ok) { lastErr = new Error('HTTP ' + res.status); continue; }
        const text = await res.text();
        if (!text || text.length < 5) { lastErr = new Error('Empty'); continue; }
        return text;
      } catch (e) { lastErr = e; }
    }
    throw lastErr || new Error('All proxies failed');
  }

  async function fetchQuote(symbol) {
    const target = `https://stooq.com/q/l/?s=${encodeURIComponent(symbol)}&f=sd2t2ohlcv&h&e=csv`;
    const text = await fetchWithProxy(target);
    const lines = text.trim().split('\n');
    if (lines.length < 2) throw new Error('No data');
    const [, date, time, open, high, low, close, volume] = lines[1].split(',');
    if (!close || close === 'N/D') throw new Error('No price');
    return {
      date, time,
      open: parseFloat(open),
      high: parseFloat(high),
      low: parseFloat(low),
      close: parseFloat(close),
    };
  }

  // OHLC 일봉 (스파크라인 + 캔들차트 공용)
  async function fetchOHLC(symbol) {
    const target = `https://stooq.com/q/d/l/?s=${encodeURIComponent(symbol)}&i=d`;
    const text = await fetchWithProxy(target);
    const lines = text.trim().split('\n');
    if (lines.length < 2) return [];
    return lines.slice(1).map(l => {
      const [date, open, high, low, close] = l.split(',');
      return {
        date,
        open: parseFloat(open),
        high: parseFloat(high),
        low: parseFloat(low),
        close: parseFloat(close),
      };
    }).filter(d => !isNaN(d.close));
  }

  function formatPrice(value, isYield) {
    if (isYield) return value.toFixed(3) + '%';
    if (value >= 1000) {
      return value.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }
    return value.toFixed(2);
  }

  function buildSparkline(values) {
    if (!values || values.length < 2) return '';
    const W = 100, H = 100;
    const min = Math.min(...values);
    const max = Math.max(...values);
    const range = max - min || 1;
    const step = W / (values.length - 1);
    const points = values.map((v, i) => {
      const x = i * step;
      const y = H - ((v - min) / range) * H;
      return `${x.toFixed(1)},${y.toFixed(1)}`;
    });
    const line = `M ${points.join(' L ')}`;
    const area = `M 0,${H} L ${points.join(' L ')} L ${W},${H} Z`;
    return `
      <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
        <path class="area" d="${area}"/>
        <path class="line" d="${line}" vector-effect="non-scaling-stroke"/>
      </svg>
    `;
  }

  function buildCard(ind) {
    const id = 'card-' + ind.symbol.replace(/[^a-z0-9]/gi, '');
    return `
      <div class="card loading" id="${id}" data-symbol="${ind.symbol}">
        <div class="card-head">
          <div class="symbol">${ind.name}</div>
          <div class="ticker">${ind.ticker}</div>
        </div>
        <div class="price-row">
          <span class="price">—</span>
          <span class="pct">—</span>
        </div>
        <div class="chart"></div>
        <div class="card-foot">
          <span class="delta">—</span>
          <span class="ts">—</span>
        </div>
      </div>
    `;
  }

  // OHLC 캐시 (모달용)
  const OHLC_CACHE = {};

  async function loadIndicator(ind) {
    const id = 'card-' + ind.symbol.replace(/[^a-z0-9]/gi, '');
    const card = document.getElementById(id);
    if (!card) return;

    try {
      const [data, ohlc] = await Promise.all([
        fetchQuote(ind.symbol),
        fetchOHLC(ind.symbol).catch(() => []),
      ]);

      OHLC_CACHE[ind.symbol] = ohlc;

      const change = data.close - data.open;
      const pct = (change / data.open) * 100;
      const isUp = change >= 0;
      const sign = isUp ? '+' : '';
      const arrow = isUp ? '▲' : '▼';

      card.classList.remove('loading', 'error');
      card.classList.toggle('up', isUp);
      card.classList.toggle('down', !isUp);

      const priceEl = card.querySelector('.price');
      priceEl.textContent = formatPrice(data.close, ind.isYield);
      priceEl.classList.toggle('up', isUp);
      priceEl.classList.toggle('down', !isUp);

      const pctEl = card.querySelector('.pct');
      pctEl.textContent = `${sign}${pct.toFixed(2)}%`;
      pctEl.classList.toggle('up', isUp);
      pctEl.classList.toggle('down', !isUp);

      const deltaEl = card.querySelector('.delta');
      deltaEl.textContent = `${arrow} ${sign}${formatPrice(Math.abs(change), ind.isYield)}`;
      deltaEl.classList.toggle('up', isUp);
      deltaEl.classList.toggle('down', !isUp);

      card.querySelector('.ts').textContent = data.date;

      // 스파크라인: 최근 30개 종가
      const sparkValues = ohlc.slice(-30).map(d => d.close);
      card.querySelector('.chart').innerHTML = buildSparkline(sparkValues);

      // 최신 OHLC 정보를 카드에 저장 (모달에서 사용)
      card.dataset.open = data.open;
      card.dataset.high = data.high;
      card.dataset.low = data.low;
      card.dataset.close = data.close;
      card.dataset.pct = pct.toFixed(2);
      card.dataset.up = isUp;
    } catch (e) {
      console.error('Failed:', ind.symbol, e);
      card.classList.remove('loading');
      card.classList.add('error');
      card.querySelector('.price').textContent = 'Unavailable';
      card.querySelector('.ts').textContent = '';
    }
  }

  function renderGrids() {
    document.getElementById('grid-kr').innerHTML = INDICATORS.kr.map(buildCard).join('');
    document.getElementById('grid-us').innerHTML = INDICATORS.us.map(buildCard).join('');
    document.getElementById('grid-night').innerHTML = INDICATORS.night.map(buildCard).join('');
    document.getElementById('grid-misc').innerHTML = INDICATORS.misc.map(buildCard).join('');
    document.getElementById('count-kr').textContent = INDICATORS.kr.length + ' items';
    document.getElementById('count-us').textContent = INDICATORS.us.length + ' items';
    document.getElementById('count-night').textContent = INDICATORS.night.length + ' items';
    document.getElementById('count-misc').textContent = INDICATORS.misc.length + ' items';

    // 카드 클릭 → 모달
    document.querySelectorAll('.card').forEach(card => {
      card.addEventListener('click', () => openModal(card.dataset.symbol));
    });
  }

  async function loadAll() {
    await Promise.all(ALL.map(loadIndicator));
    const now = new Date();
    const stamp = now.toLocaleString('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
    document.getElementById('last-updated').textContent = `Updated ${stamp}`;
  }

  // ============================================================
  // 모달 + 캔들 차트
  // ============================================================
  let currentModalSymbol = null;
  let currentRange = '3M';

  function rangeToDays(r) {
    return { '1M': 22, '3M': 66, '1Y': 252 }[r] || 66;
  }

  function drawCandleChart(ohlc, isYield) {
    const chartEl = document.getElementById('modal-chart');
    if (!ohlc || ohlc.length === 0) {
      chartEl.innerHTML = `<div class="modal-empty">차트 데이터를 가져올 수 없습니다.<br>이 지표는 일부 프록시에서 차단될 수 있어요.</div>`;
      return;
    }

    const W = 800, H = 360;
    const margin = { top: 16, right: 50, bottom: 28, left: 12 };
    const innerW = W - margin.left - margin.right;
    const innerH = H - margin.top - margin.bottom;

    const min = Math.min(...ohlc.map(d => d.low));
    const max = Math.max(...ohlc.map(d => d.high));
    const pad = (max - min) * 0.08;
    const yMin = min - pad;
    const yMax = max + pad;
    const yRange = yMax - yMin;

    const n = ohlc.length;
    const candleW = Math.max(2, innerW / n * 0.7);
    const step = innerW / n;

    const yScale = v => margin.top + innerH - ((v - yMin) / yRange) * innerH;

    // Y축 격자/라벨 (5개)
    const yTicks = 5;
    let gridLines = '', yLabels = '';
    for (let i = 0; i <= yTicks; i++) {
      const v = yMin + (yRange * i / yTicks);
      const y = yScale(v);
      gridLines += `<line class="grid-line" x1="${margin.left}" y1="${y}" x2="${margin.left + innerW}" y2="${y}"/>`;
      yLabels += `<text class="axis-text" x="${margin.left + innerW + 6}" y="${y + 3}">${formatPrice(v, isYield)}</text>`;
    }

    // X축 라벨 (시작/중간/끝)
    let xLabels = '';
    const xTickIdx = [0, Math.floor(n / 2), n - 1];
    xTickIdx.forEach(i => {
      const d = ohlc[i];
      if (!d) return;
      const x = margin.left + step * i + step / 2;
      xLabels += `<text class="axis-text" x="${x}" y="${H - 8}" text-anchor="middle">${d.date}</text>`;
    });

    // 캔들
    let candles = '';
    ohlc.forEach((d, i) => {
      const x = margin.left + step * i + step / 2;
      const isUp = d.close >= d.open;
      const cls = isUp ? 'candle-up' : 'candle-down';
      const yHigh = yScale(d.high);
      const yLow = yScale(d.low);
      const yOpen = yScale(d.open);
      const yClose = yScale(d.close);
      const bodyTop = Math.min(yOpen, yClose);
      const bodyH = Math.max(1, Math.abs(yOpen - yClose));
      // 심지
      candles += `<line class="wick ${cls}" x1="${x}" y1="${yHigh}" x2="${x}" y2="${yLow}"/>`;
      // 몸통
      candles += `<rect class="${cls}" x="${x - candleW/2}" y="${bodyTop}" width="${candleW}" height="${bodyH}"/>`;
    });

    chartEl.innerHTML = `
      <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
        ${gridLines}
        ${candles}
        ${yLabels}
        ${xLabels}
      </svg>
    `;
  }

  async function openModal(symbol) {
    const ind = BY_SYMBOL[symbol];
    if (!ind) return;

    currentModalSymbol = symbol;
    const card = document.querySelector(`.card[data-symbol="${symbol}"]`);

    // 헤더 정보 채우기
    document.getElementById('modal-name').textContent = ind.name;
    document.getElementById('modal-ticker').textContent = ind.ticker;

    const close = parseFloat(card.dataset.close);
    const isUp = card.dataset.up === 'true';
    const pct = parseFloat(card.dataset.pct);
    const sign = isUp ? '+' : '';

    const priceEl = document.getElementById('modal-price');
    priceEl.textContent = isNaN(close) ? '—' : formatPrice(close, ind.isYield);
    priceEl.className = 'modal-price-main ' + (isUp ? 'up' : 'down');

    const pctEl = document.getElementById('modal-pct');
    pctEl.textContent = isNaN(pct) ? '—' : `${sign}${pct.toFixed(2)}%`;
    pctEl.className = 'modal-price-pct ' + (isUp ? 'up' : 'down');

    document.getElementById('stat-open').textContent = card.dataset.open ? formatPrice(parseFloat(card.dataset.open), ind.isYield) : '—';
    document.getElementById('stat-high').textContent = card.dataset.high ? formatPrice(parseFloat(card.dataset.high), ind.isYield) : '—';
    document.getElementById('stat-low').textContent = card.dataset.low ? formatPrice(parseFloat(card.dataset.low), ind.isYield) : '—';
    document.getElementById('stat-close').textContent = card.dataset.close ? formatPrice(parseFloat(card.dataset.close), ind.isYield) : '—';

    document.getElementById('modal').classList.add('open');
    document.body.style.overflow = 'hidden';

    await renderModalChart();
  }

  async function renderModalChart() {
    const ind = BY_SYMBOL[currentModalSymbol];
    if (!ind) return;
    const chartEl = document.getElementById('modal-chart');
    chartEl.innerHTML = `<div class="modal-loading">LOADING...</div>`;

    let ohlc = OHLC_CACHE[currentModalSymbol];
    if (!ohlc || ohlc.length === 0) {
      try {
        ohlc = await fetchOHLC(currentModalSymbol);
        OHLC_CACHE[currentModalSymbol] = ohlc;
      } catch (e) {
        ohlc = [];
      }
    }

    const days = rangeToDays(currentRange);
    const sliced = ohlc.slice(-days);
    drawCandleChart(sliced, ind.isYield);
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('open');
    document.body.style.overflow = '';
    currentModalSymbol = null;
  }

  // 이벤트 바인딩
  document.getElementById('modal').addEventListener('click', closeModal);
  document.getElementById('modal-close').addEventListener('click', closeModal);
  document.querySelectorAll('.range-btn').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentRange = btn.dataset.range;
      await renderModalChart();
    });
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeModal();
  });

  document.getElementById('refresh-btn').addEventListener('click', async (e) => {
    e.target.classList.add('refreshing');
    e.target.textContent = 'LOADING...';
    renderGrids();
    await loadAll();
    e.target.classList.remove('refreshing');
    e.target.textContent = 'REFRESH';
  });

  renderGrids();
  loadAll();
  setInterval(loadAll, 5 * 60 * 1000);
</script>

</body>
</html>
